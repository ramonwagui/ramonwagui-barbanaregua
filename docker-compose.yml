version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Ambiente de desenvolvimento local — Fase 1: Notification Service extraído
#
# O monolito Next.js roda via `npm run dev` na máquina host (não no Docker).
# Subir com: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL principal (monolito) ───────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: barbanaregua-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barbanaregua
      POSTGRES_PASSWORD: barbanaregua123
      POSTGRES_DB: barbanaregua
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbanaregua"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - barbanaregua

  # ── PostgreSQL do Notification Service (banco próprio) ────────────────────
  postgres-notif:
    image: postgres:17-alpine
    container_name: barbanaregua-postgres-notif
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif123
      POSTGRES_DB: notification_service
    volumes:
      - postgres_notif_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - barbanaregua

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: barbanaregua-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barbanaregua

  # ── PostgreSQL do Billing Service (banco próprio) ─────────────────────────
  postgres-billing:
    image: postgres:17-alpine
    container_name: barbanaregua-postgres-billing
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing123
      POSTGRES_DB: billing_service
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - barbanaregua

  # ── Billing Service ───────────────────────────────────────────────────────
  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: barbanaregua-billing-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      DATABASE_URL: postgresql://billing:billing123@postgres-billing:5432/billing_service
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      PORT: "3006"
      NODE_ENV: development
      LOG_LEVEL: info
      APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-dev-internal-key-trocar-em-prod}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_BASIC: "${STRIPE_PRICE_BASIC:-}"
      STRIPE_PRICE_PRO: "${STRIPE_PRICE_PRO:-}"
      STRIPE_PRICE_PREMIUM: "${STRIPE_PRICE_PREMIUM:-}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - barbanaregua

  # ── Notification Service ──────────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: barbanaregua-notification-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      DATABASE_URL: postgresql://notif:notif123@postgres-notif:5432/notification_service
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      PORT: "3007"
      NODE_ENV: development
      LOG_LEVEL: info
      APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-dev-internal-key-trocar-em-prod}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_TEMPLATE_LANG: "${WHATSAPP_TEMPLATE_LANG:-pt_BR}"
      ZAPI_CLIENT_TOKEN: "${ZAPI_CLIENT_TOKEN:-}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-notif:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3007/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - barbanaregua

  # ── PostgreSQL do Payment Service (banco próprio) ─────────────────────────
  postgres-payment:
    image: postgres:17-alpine
    container_name: barbanaregua-postgres-payment
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
      POSTGRES_DB: payment_service
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - barbanaregua

  # ── Payment Service ───────────────────────────────────────────────────────
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: barbanaregua-payment-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://payment:payment123@postgres-payment:5432/payment_service
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      PORT: "3005"
      NODE_ENV: development
      LOG_LEVEL: info
      MONOLITH_URL: "${NEXT_PUBLIC_APP_URL:-http://host.docker.internal:3000}"
      APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-dev-internal-key-trocar-em-prod}"
      MERCADOPAGO_CLIENT_ID: "${MERCADOPAGO_CLIENT_ID:-}"
      MERCADOPAGO_CLIENT_SECRET: "${MERCADOPAGO_CLIENT_SECRET:-}"
      MERCADOPAGO_WEBHOOK_SECRET: "${MERCADOPAGO_WEBHOOK_SECRET:-}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - barbanaregua

volumes:
  postgres_data:
  postgres_notif_data:
  postgres_billing_data:
  postgres_payment_data:
  rabbitmq_data:

networks:
  barbanaregua:
    driver: bridge
